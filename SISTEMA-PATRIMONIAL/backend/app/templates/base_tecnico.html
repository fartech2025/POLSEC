<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Painel do Técnico{% endblock %} — POLSEC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/static/css/style.css" rel="stylesheet"/>
  <style>
    /* Sidebar do técnico — POLSEC com acento azul */
    #sidebar-tecnico {
      width: 240px;
      min-height: 100vh;
      flex-shrink: 0;
      position: sticky;
      top: 0;
      height: 100vh;
      overflow-y: auto;
      background: linear-gradient(180deg, #0a0a0a 0%, #001a2e 100%);
      border-right: 1px solid #1a2a3a;
    }
    #sidebar-tecnico .nav-link {
      color: #9ab0c8;
      font-size: .875rem;
      border-radius: .375rem;
      padding: .5rem .75rem;
      transition: background .15s, color .15s;
    }
    #sidebar-tecnico .nav-link:hover {
      background: rgba(0, 120, 215, .12);
      color: #4da6ff;
    }
    #sidebar-tecnico .nav-link.active {
      background: rgba(0, 120, 215, .2);
      color: #4da6ff;
      font-weight: 600;
    }
    #sidebar-tecnico .nav-link .bi {
      width: 1.1rem;
    }
    .tecnico-brand {
      font-size: 1.1rem;
      font-weight: 700;
      letter-spacing: .1em;
      text-transform: uppercase;
      color: #ff4e17 !important;
    }
    .tecnico-badge {
      background: rgba(0, 120, 215, .2);
      color: #4da6ff;
      font-size: .6rem;
      letter-spacing: .1em;
      text-transform: uppercase;
      border-radius: 4px;
      padding: 2px 7px;
    }
    .tecnico-section {
      font-size: .6rem;
      letter-spacing: .12em;
      text-transform: uppercase;
      color: #4da6ff;
      opacity: .55;
    }
    /* Badge de prioridade */
    .badge-critica  { background: #dc3545; color: #fff; }
    .badge-alta     { background: #fd7e14; color: #fff; }
    .badge-media    { background: #ffc107; color: #000; }
    .badge-baixa    { background: #198754; color: #fff; }
    /* Badge de status */
    .badge-aberto              { background: #0078d7; color: #fff; }
    .badge-em_atendimento      { background: #6f42c1; color: #fff; }
    .badge-aguardando_peca     { background: #fd7e14; color: #fff; }
    .badge-aguardando_aprovacao{ background: #ffc107; color: #000; }
    .badge-concluido           { background: #198754; color: #fff; }
    .badge-cancelado           { background: #6c757d; color: #fff; }
    .badge-rejeitado           { background: #dc3545; color: #fff; }
  </style>
</head>
<body>

<div class="d-flex" id="wrapper">
  <!-- Sidebar técnico -->
  <nav id="sidebar-tecnico" class="p-3 d-flex flex-column">
    <!-- Marca -->
    <div class="mb-4 text-center">
      <img src="https://nolchmlmkebfuiamxvml.supabase.co/storage/v1/object/public/POLSEC%20IMAGES/PNG/POLSEC_MARCA_Artboard%201%20copy%2016.png"
           alt="POLSEC" style="width:150px;height:auto;display:block;margin:0 auto;" />
    </div>

    <!-- Usuário logado -->
    <div class="d-flex align-items-center gap-2 mb-4 px-1">
      <div class="rounded-circle bg-primary bg-opacity-25 d-flex align-items-center justify-content-center flex-shrink-0"
           style="width:34px;height:34px;font-size:.85rem;font-weight:700;color:#4da6ff;">
        {{ usuario.nome[0] | upper }}
      </div>
      <div style="min-width:0;">
        <div class="text-white fw-semibold small text-truncate">{{ usuario.nome }}</div>
        <div style="font-size:.7rem;color:#4da6ff;opacity:.8;">
          {% if funcionario %}{{ funcionario.nome }}{% else %}operador{% endif %}
        </div>
      </div>
    </div>

    <!-- Menu -->
    <ul class="nav flex-column gap-1 flex-grow-1">
      <li class="nav-item">
        <a class="nav-link {% if request.url.path == '/tecnico' or request.url.path == '/tecnico/' %}active{% endif %}"
           href="/tecnico">
          <i class="bi bi-clipboard2-pulse me-2"></i><span>Meus Chamados</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link" href="/tecnico#novo" id="linkNovoChamado">
          <i class="bi bi-plus-circle me-2"></i><span>Novo Chamado</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/patrimonio') %}active{% endif %}"
           href="/patrimonio">
          <i class="bi bi-box-seam me-2"></i><span>Patrimônios</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/movimentacao') %}active{% endif %}"
           href="/movimentacao">
          <i class="bi bi-arrow-left-right me-2"></i><span>Movimentações</span>
        </a>
      </li>

      <li class="nav-item mt-3 mb-1">
        <span class="tecnico-section">Ferramentas</span>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/assistente') %}active{% endif %}"
           href="/assistente">
          <i class="bi bi-robot me-2"></i><span>Assistente IA</span>
        </a>
      </li>
    </ul>

    <!-- Rodapé -->
    <div class="mt-auto pt-3" style="border-top:1px solid #1a2a3a;">
      <a href="/auth/logout" class="btn btn-sm w-100"
         style="border:1px solid #4da6ff;color:#4da6ff;font-size:.75rem;">
        <i class="bi bi-box-arrow-right me-1"></i> Sair
      </a>
    </div>
  </nav>

  <!-- Conteúdo -->
  <div id="content" class="flex-grow-1 p-4" style="background:#f5f7fa;min-height:100vh;">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
