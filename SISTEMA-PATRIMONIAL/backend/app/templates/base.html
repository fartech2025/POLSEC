<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>{% block title %}Sistema Patrimonial{% endblock %} — POLSEC</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet"/>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet"/>
  <link href="/static/css/style.css" rel="stylesheet"/>
</head>
<body>

<!-- Sidebar -->
<div class="d-flex" id="wrapper">
  <nav id="sidebar" class="p-3 d-flex flex-column">
    <!-- Marca -->
    <div class="mb-4 text-center">
      <span class="sidebar-brand d-block">POLSEC</span>
      <span class="sidebar-subtitle d-block mt-1">Gestão Patrimonial</span>
    </div>

    <!-- Menu principal -->
    <ul class="nav flex-column gap-1 flex-grow-1">
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/dashboard') %}active{% endif %}"
           href="/dashboard">
          <i class="bi bi-speedometer2 me-2"></i><span>Dashboard</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/patrimonio') %}active{% endif %}"
           href="/patrimonio">
          <i class="bi bi-box-seam me-2"></i><span>Patrimônios</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/movimentacao') %}active{% endif %}"
           href="/movimentacao">
          <i class="bi bi-arrow-left-right me-2"></i><span>Movimentações</span>
        </a>
      </li>

      <!-- Seção Inteligência -->
      <li class="nav-item mt-3 mb-1">
        <span class="sidebar-section-label">Inteligência</span>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/assistente') %}active{% endif %}"
           href="/assistente">
          <i class="bi bi-robot me-2"></i><span>Assistente IA</span>
        </a>
      </li>
      <li class="nav-item">
        <a class="nav-link {% if request.url.path.startswith('/da') %}active{% endif %}"
           href="/da">
          <i class="bi bi-bar-chart-line me-2"></i><span>Data Analytics</span>
        </a>
      </li>
    </ul>

    <!-- Rodapé -->
    <div class="mt-auto sidebar-footer pt-3">
      <small class="text-secondary d-block mb-1" style="font-size:.75rem;">
        <i class="bi bi-person-circle me-1"></i> {{ usuario.nome }}
      </small>
      <small class="text-secondary d-block mb-3" style="font-size:.7rem;opacity:.6;">
        {{ usuario.perfil.value }}
      </small>
      <a href="/auth/logout" class="btn btn-sm w-100"
         style="border:1px solid #ff4e17;color:#ff4e17;font-size:.75rem;">
        <i class="bi bi-box-arrow-right me-1"></i> Sair
      </a>
    </div>
  </nav>

  <!-- Conteúdo -->
  <div id="content" class="flex-grow-1 p-4">
    {% block content %}{% endblock %}
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<script src="/static/js/main.js"></script>
{% block scripts %}{% endblock %}
</body>
</html>
